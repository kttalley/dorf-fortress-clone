<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Fortress v0.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
  <link href="styles/tailwind.css" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color: #c0c0c0;
      font-family: 'Courier New', Consolas, Monaco, monospace;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #game-container {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }

    #map-display {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* On smaller screens, allow scrolling and align to top-left */
    @media (max-width: 900px) {
      #map-display {
        align-items: flex-start;
        justify-content: flex-start;
      }
    }

    /* Track footer height so floating widgets can clear it.
       (No site header on this page; the game runs edge-to-edge.) */
    :root {
      --site-header-h: 0rem;
      --site-footer-h: 3rem;
    }

    /* ---- Floating widget placement ---- */
    /* Top-fixed widgets sit just below the header. */
    #biome-title-widget {
      top: calc(var(--site-header-h) + 8px) !important;
      z-index: 400 !important;
    }

    #thought-widget {
      top: calc(var(--site-header-h) + 8px) !important;
    }

    #conversation-toast {
      top: calc(var(--site-header-h) + 8px) !important;
    }

    #event-log-widget {
      /* Sits below thought widget (header+8px to header+8px+310px ≈ header+320px)
         with a comfortable gap. Shortened by ~15% vs original 320px max-height. */
      top: calc(var(--site-header-h) + 330px) !important;
    }

    /* Bottom-fixed widgets sit just above the footer. */
    #controls-widget {
      bottom: calc(var(--site-footer-h) + 12px) !important;
    }

    #assistant-toggle-btn {
      bottom: calc(var(--site-footer-h) + 64px) !important;
    }

    /* ---- z-index tiers ----
       Speech bubbles (200) → floating widgets (500) → popovers (9500)
       → info modal (9600) → loading screen (99999). */
    .stat-panel {
      z-index: 9500 !important;
    }

    .game-assistant-panel {
      z-index: 9500 !important;
    }

    .popover-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.05);
      z-index: 9490;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .popover-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .info-modal {
      z-index: 9600 !important;
    }

    /* ==================== Footer ==================== */
    .site-footer {
      flex-shrink: 0;
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: #000;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .site-footer p {
      margin: 0;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Inconsolata', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* The caption doubles as the way home now that the header is gone */
    .site-footer a {
      color: inherit;
      text-decoration: none;
      transition: 0.2s ease-in-out;
    }

    .site-footer a:hover,
    .site-footer a:focus-visible {
      color: #c830ff;
      text-decoration: underline;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
      gap: 2rem;
    }

    #loading-screen.hidden {
      display: none;
    }

    .loading-text {
      font-size: 2rem;
      color: #c0c0c0;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top: 3px solid #c0c0c0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating widget common styles */
    .floating-widget {
      position: fixed;
      background: rgba(15, 15, 20, 0.95);
      border: 1px solid rgba(100, 100, 120, 0.5);
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 500;
    }

    /* Controls widget - bottom center */
    #controls-widget {
      bottom: calc(2.75rem + 12px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      align-items: center;
    }

    #controls-widget button {
      background: rgba(30, 30, 40, 0.9);
      border: 1px solid rgba(100, 100, 120, 0.5);
      color: #0ff;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-radius: 4px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    #controls-widget button:hover {
      background: rgba(50, 50, 60, 0.9);
      border-color: #0ff;
    }

    #controls-widget button:active {
      background: rgba(70, 70, 80, 0.9);
    }

    #controls-widget .status-compact {
      display: flex;
      gap: 12px;
      padding: 0 12px;
      border-left: 1px solid rgba(100, 100, 120, 0.3);
      margin-left: 4px;
      font-size: 11px;
      color: #888;
    }

    #controls-widget .status-compact .stat-value {
      color: #0ff;
      margin-left: 4px;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(20, 20, 30, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(100, 100, 120, 0.5);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(120, 120, 140, 0.6);
    }

    /* Mobile adjustments */
    @media (max-width: 728px) {
      #controls-widget {
        padding: 8px 12px;
        gap: 6px;
      }

      #controls-widget button {
        padding: 6px 10px;
        font-size: 11px;
      }

      #controls-widget .status-compact {
        display: none;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Generating World...</div>
  </div>

  <div id="game-container">
    <div id="map-display"></div>
    <!-- All UI is now floating widgets injected by JS -->
  </div>

  <footer class="site-footer" role="contentinfo">
    <p><a href="/" aria-label="back to homepage">handcrafted with care by KTT</a></p>
  </footer>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZX4410GSD3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-ZX4410GSD3');
  </script>

  <script type="module" src="src/main.js"></script>
</body>

</html>
